<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 | 找不到页面</title>
    <meta name="description" content="页面走丢了，回到主页看看吧" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@300;400;600;700&family=ZCOOL+XiaoWei&display=swap"
    />
    <style>
      :root {
        --bg: #f8f3f8;
        --ink: #2b1d2a;
        --soft: #7e6a86;
        --accent: #ff7ab6;
        --card: #fff8ff;
        --line: #e9d9ea;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        background: radial-gradient(circle at top, #ffd4e6, transparent 60%),
          radial-gradient(circle at bottom, #c8f6ed, transparent 60%),
          var(--bg);
        color: var(--ink);
        font-family: "M PLUS Rounded 1c", "PingFang SC", "Hiragino Sans GB", "Noto Sans CJK SC", "Microsoft YaHei UI", "Microsoft YaHei", "Segoe UI", system-ui, -apple-system, sans-serif;
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        display: grid;
        place-items: center;
        padding: 32px;
      }
      .card {
        width: min(520px, 92vw);
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 28px;
        padding: 28px;
        box-shadow: 0 16px 40px rgba(47, 20, 47, 0.12);
      }
      h1 {
        font-family: "ZCOOL XiaoWei", "LXGW WenKai", "STKaiti", "KaiTi", "Songti SC", "Noto Serif CJK SC", "Source Han Serif SC", serif;
        font-size: 48px;
        margin: 0 0 8px;
      }
      p {
        margin: 0 0 18px;
        color: var(--soft);
        line-height: 1.7;
      }
      a {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 16px;
        border-radius: 999px;
        background: var(--ink);
        color: #fff;
        text-decoration: none;
        font-size: 14px;
      }
      .tip {
        margin-top: 12px;
        font-size: 12px;
        color: var(--soft);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div style="font-size: 18px; color: var(--soft);">页面走丢啦</div>
      <h1>404</h1>
      <p>这里没有内容，可能被小猫藏起来了。试试回到主页吧。</p>
      <a href="/">🐾 返回主页</a>
      <div class="tip">如果这是一个错误链接，请告诉我。</div>
    </div>
  </body>
</html>
