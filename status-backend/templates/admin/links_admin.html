<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meow 友链管理</title>
    <link rel="stylesheet" href="/admin/common.css" />
    <style>
      .wrap { max-width: 1120px; }
      input, textarea {
        width: 100%;
        box-sizing: border-box;
        border-radius: 12px;
        border: 1px solid #eadbea;
        padding: 10px 12px;
        font-size: 13px;
        background: rgba(255, 255, 255, 0.84);
      }
      textarea { min-height: 72px; resize: vertical; }
      .grid-2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        align-items: start;
      }
      .panel {
        border-radius: 16px;
        border: 1px solid rgba(234, 219, 234, 0.9);
        background: rgba(255, 255, 255, 0.72);
        padding: 12px;
        margin-top: 12px;
      }
      .panel-links { display: flex; flex-direction: column; }
      .list { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
      #link-list {
        max-height: min(62vh, 780px);
        overflow-y: auto;
        padding-right: 4px;
      }
      #link-list::-webkit-scrollbar { width: 6px; }
      #link-list::-webkit-scrollbar-thumb { background: rgba(234, 171, 216, 0.45); border-radius: 999px; }
      .item {
        border-radius: 14px;
        border: 1px solid rgba(234, 219, 234, 0.9);
        background: rgba(255, 255, 255, 0.78);
        padding: 10px;
      }
      .status-box {
        margin-top: 10px;
        padding: 8px 10px;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.85);
        border: 1px dashed rgba(234, 219, 234, 0.9);
        color: #5b4c5a;
        font-size: 12px;
      }
      .log-list {
        margin-top: 8px;
        max-height: 180px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .log-item {
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.82);
        border: 1px solid rgba(234, 219, 234, 0.65);
        font-size: 12px;
        color: #6d5f6b;
        padding: 6px 8px;
        line-height: 1.45;
      }
      .item.collapsed .item-body { display: none; }
      .item-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
      }
      .item-title { font-size: 14px; font-weight: 700; }
      .item-meta { font-size: 12px; color: #7b6b7a; margin-top: 4px; word-break: break-all; }
      .row-inline { display: flex; gap: 8px; align-items: center; }
      .small { font-size: 12px; color: #7b6b7a; }
      .danger { background: #a03555; }
      .ok { background: #2f8a58; }
      .ghost { background: rgba(255, 255, 255, 0.9); color: #2b1d2a; border: 1px solid #eadbea; }
      .toggle { min-width: 72px; }
      @media (max-width: 860px) {
        .grid-2 { grid-template-columns: 1fr; }
        #link-list { max-height: none; overflow: visible; padding-right: 0; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="window">
        <div class="titlebar"><span class="dot"></span>Meow Links Admin</div>
        <div class="content">
          <div class="row">
            <div>
              <label>Token</label>
              <input id="token" type="password" placeholder="输入 STATUS_TOKEN" />
            </div>
            <div>
              <label>接口根路径</label>
              <input id="base" type="text" value="" placeholder="留空表示同域名" />
            </div>
          </div>
          <div class="toolbar">
            <button id="load-all" class="ghost">刷新全部</button>
          </div>

          <div class="grid-2">
            <div class="panel">
              <div class="row-inline">
                <strong>待审核申请</strong>
                <span class="small" id="pending-count"></span>
              </div>
              <div class="small">仅显示 `pending`，审核通过/拒绝后会自动从此处消失。</div>
              <div id="app-list" class="list"></div>
              <div style="margin-top:10px;">
                <strong>操作状态与日志</strong>
                <div id="status" class="status-box">等待操作</div>
                <div id="log-list" class="log-list"></div>
              </div>
            </div>
            <div class="panel panel-links">
              <div class="row-inline">
                <strong>已收录友链</strong>
                <button id="save-sort" class="ghost">保存排序</button>
              </div>
              <div id="link-list" class="list"></div>
            </div>
          </div>

          <div class="panel">
            <strong>TG / SMTP 配置</strong>
            <div class="small" style="margin-top:6px;">
              SMTP 结果通知依赖以下字段：`SMTP Host`、`SMTP From`、`SMTP To`（站长收件箱）。
              申请者回信通知会自动发往其申请邮箱。`SMTP Pass` 留空表示不修改，输入 `-` 表示清空。
            </div>
            <div class="grid-2" style="margin-top:10px;">
              <div>
                <label>TG Bot Token</label>
                <input id="tg_bot_token" type="text" placeholder="如：123456:ABCDEF..." />
              </div>
              <div>
                <label>TG Chat ID</label>
                <input id="tg_chat_id" type="text" placeholder="如：123456789 或 -100xxxx" />
              </div>
              <div>
                <label>SMTP Host</label>
                <input id="smtp_host" type="text" placeholder="如：smtp.qq.com" />
              </div>
              <div>
                <label>SMTP Port</label>
                <input id="smtp_port" type="number" placeholder="587 / 465" />
              </div>
              <div>
                <label>SMTP User</label>
                <input id="smtp_user" type="text" placeholder="如：bot@example.com" />
              </div>
              <div>
                <label>SMTP Pass（留空不改，输入 `-` 清空）</label>
                <input id="smtp_pass" type="password" placeholder="SMTP 密码/授权码" />
              </div>
              <div>
                <label>SMTP From</label>
                <input id="smtp_from" type="text" placeholder="如：Meow Bot <bot@example.com>" />
              </div>
              <div>
                <label>SMTP To（逗号分隔）</label>
                <input id="smtp_to" type="text" placeholder="如：owner@example.com,backup@example.com" />
              </div>
            </div>
            <div class="toolbar">
              <label class="row-inline small">
                <input id="smtp_starttls" type="checkbox" style="width:auto;" checked />
                启用 STARTTLS
              </label>
              <button id="save-settings">保存通知配置</button>
            </div>
            <div class="row">
              <div>
                <label>测试收件邮箱（可选）</label>
                <input id="smtp_test_recipient" type="text" placeholder="留空则发到 SMTP To 配置中的收件人" />
              </div>
              <div style="display:flex;align-items:flex-end;">
                <button id="test-smtp" class="ghost">发送测试邮件</button>
              </div>
            </div>

            <hr style="margin: 14px 0; border: 0; border-top: 1px dashed rgba(234, 219, 234, 0.9);" />
            <strong>申请风控配置</strong>
            <div class="small" style="margin-top:6px;">
              Captcha Secret 留空不改，输入 `-` 表示清空。Captcha Site Key 会公开给申请页前端使用。
            </div>
            <div class="grid-2" style="margin-top:10px;">
              <div>
                <label>Captcha Provider</label>
                <select id="captcha_provider" style="width:100%;height:40px;border:1px solid #eadbea;border-radius:12px;padding:0 12px;background:rgba(255,255,255,0.84);">
                  <option value="">关闭</option>
                  <option value="turnstile">Turnstile</option>
                  <option value="hcaptcha">hCaptcha</option>
                </select>
              </div>
              <div>
                <label>Captcha Site Key</label>
                <input id="captcha_site_key" type="text" placeholder="前端公开 Site Key" />
              </div>
              <div>
                <label>Captcha Secret（留空不改，输入 `-` 清空）</label>
                <input id="captcha_secret" type="password" placeholder="服务端验证 Secret" />
              </div>
              <div>
                <label>Captcha Secret 状态</label>
                <input id="captcha_secret_state" type="text" disabled placeholder="未加载" />
              </div>
              <div>
                <label>IP 限流窗口秒数</label>
                <input id="apply_rate_limit_window_sec" type="number" min="60" max="86400" />
              </div>
              <div>
                <label>窗口内最大申请次数</label>
                <input id="apply_rate_limit_max" type="number" min="1" max="30" />
              </div>
              <div>
                <label>申请域名黑名单（逗号分隔）</label>
                <input id="apply_deny_hosts" type="text" placeholder="如：aliyun.com,qq.com,baidu.com" />
              </div>
              <div class="row-inline small" style="align-items:flex-end;">
                <label class="row-inline small">
                  <input id="block_disposable_email" type="checkbox" style="width:auto;" checked />
                  屏蔽一次性邮箱
                </label>
                <label class="row-inline small">
                  <input id="block_edu_gov_email" type="checkbox" style="width:auto;" checked />
                  屏蔽 edu/gov 邮箱
                </label>
              </div>
            </div>
          </div>

        </div>
      </div>
    </div>
    <script>
      const statusEl = document.getElementById("status");
      const logListEl = document.getElementById("log-list");
      const tokenEl = document.getElementById("token");
      const baseEl = document.getElementById("base");
      const appListEl = document.getElementById("app-list");
      const linkListEl = document.getElementById("link-list");
      const pendingCountEl = document.getElementById("pending-count");

      const api = (path) => `${baseEl.value.trim()}${path}`;
      const apiNoStore = (path) => {
        const target = api(path);
        return `${target}${target.includes("?") ? "&" : "?"}_ts=${Date.now()}`;
      };
      const setStatus = (text) => {
        const message = String(text || "").trim() || "无状态信息";
        statusEl.textContent = message;
        const now = new Date().toLocaleTimeString("zh-CN", { hour12: false });
        const row = document.createElement("div");
        row.className = "log-item";
        row.textContent = `[${now}] ${message}`;
        logListEl.prepend(row);
        const logs = Array.from(logListEl.children);
        if (logs.length > 80) {
          logs.slice(80).forEach((el) => el.remove());
        }
      };
      const esc = (value = "") => String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll("\"", "&quot;");
      const authHeaders = () => ({
        "content-type": "application/json",
        "x-token": tokenEl.value.trim()
      });
      const ts = (value) => new Date(Number(value || 0) * 1000).toLocaleString("zh-CN");

      const readSettingsForm = () => {
        const passRaw = document.getElementById("smtp_pass").value.trim();
        const captchaSecretRaw = document.getElementById("captcha_secret").value.trim();
        return {
          tg_bot_token: document.getElementById("tg_bot_token").value.trim(),
          tg_chat_id: document.getElementById("tg_chat_id").value.trim(),
          smtp_host: document.getElementById("smtp_host").value.trim(),
          smtp_port: Number(document.getElementById("smtp_port").value || 0) || null,
          smtp_user: document.getElementById("smtp_user").value.trim(),
          smtp_pass: passRaw === "" ? null : (passRaw === "-" ? "" : passRaw),
          smtp_from: document.getElementById("smtp_from").value.trim(),
          smtp_to: document.getElementById("smtp_to").value.trim(),
          smtp_starttls: document.getElementById("smtp_starttls").checked,
          captcha_provider: document.getElementById("captcha_provider").value.trim() || null,
          captcha_site_key: document.getElementById("captcha_site_key").value.trim(),
          captcha_secret: captchaSecretRaw === "" ? null : (captchaSecretRaw === "-" ? "" : captchaSecretRaw),
          apply_rate_limit_window_sec: Number(document.getElementById("apply_rate_limit_window_sec").value || 0) || null,
          apply_rate_limit_max: Number(document.getElementById("apply_rate_limit_max").value || 0) || null,
          block_disposable_email: document.getElementById("block_disposable_email").checked,
          block_edu_gov_email: document.getElementById("block_edu_gov_email").checked,
          apply_deny_hosts: document.getElementById("apply_deny_hosts").value.trim()
        };
      };

      const fillSettingsForm = (cfg = {}) => {
        document.getElementById("tg_bot_token").value = cfg.tg_bot_token || "";
        document.getElementById("tg_chat_id").value = cfg.tg_chat_id || "";
        document.getElementById("smtp_host").value = cfg.smtp_host || "";
        document.getElementById("smtp_port").value = cfg.smtp_port || "";
        document.getElementById("smtp_user").value = cfg.smtp_user || "";
        document.getElementById("smtp_pass").value = "";
        document.getElementById("smtp_from").value = cfg.smtp_from || "";
        document.getElementById("smtp_to").value = cfg.smtp_to || "";
        document.getElementById("smtp_starttls").checked = cfg.smtp_starttls !== false;
        document.getElementById("captcha_provider").value = cfg.captcha_provider || "";
        document.getElementById("captcha_site_key").value = cfg.captcha_site_key || "";
        document.getElementById("captcha_secret").value = "";
        document.getElementById("captcha_secret_state").value = cfg.captcha_secret_set ? "已配置" : "未配置";
        document.getElementById("apply_rate_limit_window_sec").value = Number(cfg.apply_rate_limit_window_sec || 3600);
        document.getElementById("apply_rate_limit_max").value = Number(cfg.apply_rate_limit_max || 3);
        document.getElementById("block_disposable_email").checked = cfg.block_disposable_email !== false;
        document.getElementById("block_edu_gov_email").checked = cfg.block_edu_gov_email !== false;
        document.getElementById("apply_deny_hosts").value = cfg.apply_deny_hosts || "";
      };

      const renderApplications = (items = []) => {
        appListEl.innerHTML = "";
        const pending = items.filter((item) => item.status === "pending");
        pendingCountEl.textContent = `待审核 ${pending.length} 条`;
        if (pending.length === 0) {
          appListEl.innerHTML = `<div class="small">暂无申请记录</div>`;
          return;
        }
        pending.forEach((item) => {
          const wrap = document.createElement("div");
          wrap.className = "item";
          wrap.innerHTML = `
            <div class="item-head">
              <div>
                <div class="item-title">${esc(item.site_name)}</div>
                <div class="item-meta">${esc(item.site_url)}</div>
              </div>
              <div class="small">${esc(item.status)} · ${ts(item.created_at)}</div>
            </div>
            <div class="small">邮箱：${esc(item.email || "-")} | IP：${esc(item.ip || "-")}</div>
            <div class="small">简介：${esc(item.description || "-")}</div>
            <div class="small">备注：${esc(item.note || "-")}</div>
            <div class="row" style="margin-top:8px;">
              <div><input data-tags placeholder="通过时可附带 tags（逗号分隔）" /></div>
              <div><input data-sort type="number" placeholder="通过时 sort_order（默认当前时间）" /></div>
            </div>
            <div><textarea data-review-note placeholder="审核备注（可选）"></textarea></div>
            <div class="toolbar" style="margin-bottom:0;">
              <button class="ok" data-approve>通过</button>
              <button class="danger" data-reject>拒绝</button>
            </div>
          `;
          const submitReview = async (action) => {
            setStatus(`${action === "approve" ? "通过" : "拒绝"}处理中...`);
            const res = await fetch(api("/links/review"), {
              method: "POST",
              headers: authHeaders(),
              body: JSON.stringify({
                application_id: item.id,
                action,
                tags: wrap.querySelector("[data-tags]").value.trim() || null,
                sort_order: Number(wrap.querySelector("[data-sort]").value || 0) || null,
                review_note: wrap.querySelector("[data-review-note]").value.trim() || null
              })
            });
            if (!res.ok) {
              const data = await res.json().catch(() => ({}));
              throw new Error(data.message || "审核失败");
            }
            await loadAll();
            setStatus(action === "approve" ? "已通过" : "已拒绝");
          };
          wrap.querySelector("[data-approve]").addEventListener("click", async () => {
            try { await submitReview("approve"); } catch (err) { setStatus(err.message || "审核失败"); }
          });
          wrap.querySelector("[data-reject]").addEventListener("click", async () => {
            try { await submitReview("reject"); } catch (err) { setStatus(err.message || "审核失败"); }
          });
          appListEl.appendChild(wrap);
        });
      };

      const renderLinks = (items = []) => {
        linkListEl.innerHTML = "";
        if (items.length === 0) {
          linkListEl.innerHTML = `<div class="small">暂无已收录友链</div>`;
          return;
        }
        items.forEach((item) => {
          const stageActive = Boolean(item.backlink_deadline)
            && (!item.backlink_status || item.backlink_status === "pending");
          const stageText = stageActive
            ? `进行中（截止 ${ts(item.backlink_deadline)}）`
            : `未启用/已结束${item.backlink_status ? `（${esc(item.backlink_status)}）` : ""}`;
          const wrap = document.createElement("div");
          wrap.className = "item collapsed";
          wrap.dataset.id = item.id;
          wrap.innerHTML = `
            <div class="item-head">
              <div>
                <div class="item-title" data-title>${esc(item.name)}</div>
                <div class="item-meta">${esc(item.url)}</div>
              </div>
              <div class="row-inline">
                <button class="ghost toggle" data-toggle>展开</button>
                <button class="ghost" data-up>上移</button>
                <button class="ghost" data-down>下移</button>
              </div>
            </div>
            <div class="item-body">
              <div class="row-inline">
                <span class="small">排序</span>
                <input data-sort type="number" value="${Number(item.sort_order || 0)}" style="max-width:120px;" />
              </div>
              <div class="row" style="margin-top:8px;">
                <div><input data-name placeholder="名称" value="${esc(item.name || "")}" /></div>
                <div><input data-url placeholder="URL" value="${esc(item.url || "")}" /></div>
              </div>
              <div class="row">
                <div><input data-avatar placeholder="头像 URL" value="${esc(item.avatar_url || "")}" /></div>
                <div><input data-tags placeholder="标签（逗号分隔）" value="${esc(item.tags || "")}" /></div>
              </div>
              <div class="small" data-review-stage>
                24h回链审查：${stageText}
              </div>
              <div><textarea data-description placeholder="简介">${esc(item.description || "")}</textarea></div>
              <div class="toolbar" style="margin-bottom:0;">
                <button class="ok" data-save-item>保存编辑</button>
                <button class="ghost" data-cancel-stage style="${stageActive ? "" : "display:none;"}">取消24h审查</button>
                <button class="danger" data-delete-item>删除友链</button>
              </div>
            </div>
          `;
          wrap.querySelector("[data-toggle]").addEventListener("click", (event) => {
            wrap.classList.toggle("collapsed");
            event.currentTarget.textContent = wrap.classList.contains("collapsed") ? "展开" : "收起";
          });
          wrap.querySelector("[data-up]").addEventListener("click", () => {
            const prev = wrap.previousElementSibling;
            if (prev) linkListEl.insertBefore(wrap, prev);
          });
          wrap.querySelector("[data-down]").addEventListener("click", () => {
            const next = wrap.nextElementSibling;
            if (next) linkListEl.insertBefore(next, wrap);
          });
          wrap.querySelector("[data-name]").addEventListener("input", (event) => {
            wrap.querySelector("[data-title]").textContent = event.target.value.trim() || "未命名友链";
          });
          wrap.querySelector("[data-save-item]").addEventListener("click", async () => {
            try {
              setStatus("保存友链中...");
              const res = await fetch(api("/links/update"), {
                method: "POST",
                headers: authHeaders(),
                body: JSON.stringify({
                  id: wrap.dataset.id,
                  name: wrap.querySelector("[data-name]").value.trim(),
                  url: wrap.querySelector("[data-url]").value.trim(),
                  avatar_url: wrap.querySelector("[data-avatar]").value.trim() || null,
                  description: wrap.querySelector("[data-description]").value.trim() || null,
                  tags: wrap.querySelector("[data-tags]").value.trim() || null,
                  sort_order: Number(wrap.querySelector("[data-sort]").value || 0)
                })
              });
              if (!res.ok) {
                const data = await res.json().catch(() => ({}));
                throw new Error(data.message || "保存失败");
              }
              setStatus("友链已保存");
              await loadLinks();
            } catch (err) {
              setStatus(err.message || "保存失败");
            }
          });
          wrap.querySelector("[data-cancel-stage]").addEventListener("click", async () => {
            if (!stageActive) {
              setStatus("该站点当前不在24h回链审查阶段");
              return;
            }
            if (!confirm("确认取消该站点的24h回链审查阶段？")) return;
            try {
              setStatus("取消24h审查中...");
              const res = await fetch(api("/links/review/stage/cancel"), {
                method: "POST",
                headers: authHeaders(),
                body: JSON.stringify({ id: wrap.dataset.id })
              });
              if (!res.ok) {
                const data = await res.json().catch(() => ({}));
                throw new Error(data.message || "取消失败");
              }
              setStatus("已取消24h回链审查");
              await loadLinks();
            } catch (err) {
              setStatus(err.message || "取消失败");
            }
          });
          wrap.querySelector("[data-delete-item]").addEventListener("click", async () => {
            if (!confirm("确定删除这条友链吗？")) return;
            try {
              setStatus("删除友链中...");
              const res = await fetch(api("/links/delete"), {
                method: "POST",
                headers: authHeaders(),
                body: JSON.stringify({ id: wrap.dataset.id })
              });
              if (!res.ok) {
                const data = await res.json().catch(() => ({}));
                throw new Error(data.message || "删除失败");
              }
              setStatus("友链已删除");
              await loadLinks();
            } catch (err) {
              setStatus(err.message || "删除失败");
            }
          });
          linkListEl.appendChild(wrap);
        });
      };

      const loadApplications = async () => {
        const res = await fetch(apiNoStore("/links/applications"), {
          headers: authHeaders(),
          cache: "no-store"
        });
        if (!res.ok) throw new Error("加载申请失败");
        const data = await res.json();
        renderApplications(Array.isArray(data) ? data : []);
      };

      const loadLinks = async () => {
        const res = await fetch(apiNoStore("/links"), { cache: "no-store" });
        if (!res.ok) throw new Error("加载友链失败");
        const data = await res.json();
        renderLinks(Array.isArray(data) ? data : []);
      };

      const loadSettings = async () => {
        const res = await fetch(apiNoStore("/links/settings"), {
          headers: authHeaders(),
          cache: "no-store"
        });
        if (!res.ok) throw new Error("加载配置失败");
        const data = await res.json();
        fillSettingsForm(data || {});
      };

      const saveSort = async () => {
        const rows = Array.from(linkListEl.querySelectorAll(".item"));
        const items = rows.map((el, idx) => ({
          id: el.dataset.id,
          sort_order: Number(el.querySelector("[data-sort]").value || idx)
        }));
        setStatus("保存排序中...");
        const res = await fetch(api("/links/sort"), {
          method: "POST",
          headers: authHeaders(),
          body: JSON.stringify({ items })
        });
        setStatus(res.ok ? "排序已保存" : "排序保存失败");
        if (res.ok) await loadLinks();
      };

      const saveSettings = async () => {
        setStatus("保存通知配置中...");
        const payload = readSettingsForm();
        const res = await fetch(api("/links/settings"), {
          method: "POST",
          headers: authHeaders(),
          body: JSON.stringify(payload)
        });
        if (!res.ok) {
          setStatus("通知配置保存失败");
          return;
        }
        const data = await res.json();
        fillSettingsForm(data || {});
        setStatus("通知配置已保存");
      };

      const testSmtp = async () => {
        setStatus("SMTP 测试发送中...");
        const recipient = document.getElementById("smtp_test_recipient").value.trim();
        const res = await fetch(api("/links/settings/test-smtp"), {
          method: "POST",
          headers: authHeaders(),
          body: JSON.stringify({
            recipient: recipient || null
          })
        });
        const data = await res.json().catch(() => ({}));
        setStatus(data.message || (res.ok ? "SMTP 测试发送成功" : "SMTP 测试发送失败"));
      };

      const loadAll = async () => {
        try {
          setStatus("加载中...");
          await Promise.all([loadApplications(), loadLinks(), loadSettings()]);
          setStatus("已加载");
        } catch (err) {
          setStatus(err.message || "加载失败");
        }
      };

      document.getElementById("load-all").addEventListener("click", loadAll);
      document.getElementById("save-sort").addEventListener("click", saveSort);
      document.getElementById("save-settings").addEventListener("click", saveSettings);
      document.getElementById("test-smtp").addEventListener("click", async () => {
        try {
          await testSmtp();
        } catch (err) {
          setStatus(err.message || "SMTP 测试发送失败");
        }
      });
      loadAll();
    </script>
  </body>
</html>
